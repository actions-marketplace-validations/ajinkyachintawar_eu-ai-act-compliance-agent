name: EU AI Act Compliance Scan

on:
  workflow_dispatch:   # manual trigger from GitHub Actions tab
  pull_request:
    paths:
      - "**/*.py"
  push:
    branches:
      - main
    paths:
      - "**/*.py"

jobs:
  compliance-scan:
    name: Scan for EU AI Act violations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: EU AI Act Compliance Scan
        uses: ajinkyachintawar/eu-ai-act-compliance-agent@main
        with:
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          files: "backend/main.py backend/agents/graph.py"
          system-context: "EU AI Act compliance classifier API — FastAPI backend that classifies AI systems"
          fail-on: NONE

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eu-ai-act-scan-report
          path: eu-ai-act-scan-report.json
          retention-days: 30
